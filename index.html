function semanaActual(ini,sem){if(!ini)return 1;const diff=Math.floor((Date.now()-new Date(ini).getTime())/(7*864e5));return Math.min(sem||12,Math.max(1,diff+1));}
// Fase del ciclo menstrual (espejo de src/domain/ciclo.ts).
function faseCicloJS(fechaInicio,duracion,periodo){
  if(!fechaInicio)return null;
  const dur=duracion>0?duracion:28,per=periodo>0?periodo:5;
  const t=Math.floor((Date.now()-new Date(fechaInicio).getTime())/864e5);if(t<0)return null;
  const dia=(t%dur)+1,ov=Math.round(dur/2);
  let f;if(dia<=per)f='Menstrual';else if(dia<ov-1)f='Folicular';else if(dia<=ov+1)f='Ovulatoria';else f='Lútea';
  return {fase:f,dia};
}

// Umbral (dias sin entrenar) a partir del cual un cliente entra en riesgo de fuga.
const DIAS_INACTIVO=3;
async function cargarPrioridad(){
  const d14=hace(14);
  const d60=hace(60);
  const [al,su,ck,pl,ob,pf,se]=await Promise.all([
    sb.from("alertas").select("id,cliente_id,tipo,texto,created_at").eq("estado","abierta").order("created_at",{ascending:false}),
    sb.from("sueno").select("user_id,horas,fecha").gte("fecha",d14),
    sb.from("checkins").select("user_id,dart,fatiga,energia,fecha").gte("fecha",d14).order("fecha",{ascending:false}),
    sb.from("planes").select("user_id,inicio"),
    sb.from("objetivos").select("user_id,tipo"),
    sb.from("perfiles").select("user_id,ticket,presupuesto_adicional,pago_confirmado"),
    // Sesiones finalizadas recientes: para detectar al cliente que dejo de entrenar.
    sb.from("sesiones").select("user_id,fecha").eq("finalizada",true).gte("fecha",d60).order("fecha",{ascending:false}),
  ]);
  const cnt={};(al.data||[]).forEach(a=>cnt[a.cliente_id]=(cnt[a.cliente_id]||0)+1);
  const sl={};(su.data||[]).forEach(s=>{(sl[s.user_id]=sl[s.user_id]||[]).push(+s.horas)});
  const lc={};(ck.data||[]).forEach(c=>{if(!lc[c.user_id])lc[c.user_id]=c});
  const ini={};(pl.data||[]).forEach(p=>ini[p.user_id]=p.inicio);
  const obj={};(ob.data||[]).forEach(o=>obj[o.user_id]=o.tipo);
  const gm={};(pf.data||[]).forEach(p=>gm[p.user_id]=p);
  // Ultima sesion finalizada por usuario (la primera al venir ordenado desc).
  const ult={};(se.data||[]).forEach(s=>{if(s.user_id&&s.fecha&&!ult[s.user_id])ult[s.user_id]=s.fecha});
  CLIENTES.forEach(c=>{const u=c.user_id;let sc=0;const r=[];
    const G=gm[u]||{};c._ticket=G.ticket||"";c._presu=!!G.presupuesto_adicional;c._pago=!!G.pago_confirmado;
    const na=cnt[u]||0;if(na){sc+=3*na;r.push(na+" alerta"+(na>1?"s":""));}
    const h=sl[u]||[];const sp=h.length?h.reduce((a,x)=>a+x,0)/h.length:null;if(sp!=null&&sp<7){sc+=3;r.push("Duerme "+sp.toFixed(1)+"h");}
    const k=lc[u];if(k){if((k.dart||0)>=6){sc+=3;r.push("Dolor "+k.dart);}if((k.fatiga||0)>=7){sc+=2;r.push("Fatiga "+k.fatiga);}if(k.energia!=null&&k.energia<=3){sc+=2;r.push("Energía "+k.energia);}}
    // Radar de INACTIVIDAD: solo aplica a clientes con plan iniciado (si no
    // hay plan, "0 sesiones" es lo esperado, no una fuga). Cuenta los dias
    // desde la ultima sesion finalizada (o desde el inicio del plan si nunca
    // ha entrenado). A mas dias, mas alto el score -> el que se esta yendo
    // NO queda en verde.
    c._inact=null;
    if(ini[u]){
      const inicioDia=new Date(ini[u]+"T00:00:00").getTime();
      const yaEmpezo=Date.now()>=inicioDia;
      if(yaEmpezo){
        const refStr=ult[u]||ini[u];
        const dds=Math.floor((Date.now()-new Date(refStr+"T00:00:00").getTime())/864e5);
        if(dds>=DIAS_INACTIVO){
          const pts=dds>=7?6:dds>=5?4:2; // 3-4d amarillo, 5-6d, 7+d rojo
          sc+=pts;c._inact=dds;c._nuncaEntreno=!ult[u];
        }
      }
    }
    c._sc=sc;c._r=r;c._obj=OBJL[obj[u]]||"";c._mes=null;
    if(ini[u]){const dd=Math.floor((Date.now()-new Date(ini[u]).getTime())/864e5);if(dd>=30)c._mes=Math.floor(dd/30);}
  });
  CLIENTES.sort((a,b)=>b._sc-a._sc);renderClientes();
  ALERTAS=al.data||[];renderCampana();
}

  else h+=ALERTAS.map(a=>`<div style="border-left:3px solid var(--rojo);padding:6px 10px;margin:8px 0"><div class="muted" style="font-size:11px">${esc((a.created_at||'').slice(0,10))} · ${esc(a.tipo||'')}</div><div style="font-weight:600">${esc(nom(a.cliente_id))}</div><div class="muted" style="font-size:13px">${esc(a.texto||'')}</div><div style="margin-top:4px;display:flex;gap:6px"><button class="sm" onclick="abrirDesdeCampana('${a.cliente_id}')">Abrir cliente</button><button class="sm ghost" onclick="resolverAlerta('${a.id}')">Listo</button></div></div>`).join("");
  panel.innerHTML=h;
}

function renderClientes(){

  $("nCli").textContent=CLIENTES.length;

    const rs=(c._r&&c._r.length)?`<div class="muted" style="font-size:12px;margin-top:3px">${esc(c._r.join(" · "))}</div>`:"";
    const inact=c._inact?`<div style="font-size:12px;margin-top:3px;color:var(--rojo);font-weight:600">⚠ En riesgo: ${c._nuncaEntreno?"nunca ha entrenado ("+c._inact+"d)":c._inact+" días sin entrenar"}</div>`:"";
    const ms=c._mes?`<div style="font-size:12px;margin-top:3px;color:var(--rojo)">Informe mes ${c._mes} listo</div>`:"";
    const tcol={alto:"#e23b3b",medio:"#e0b84a",bajo:"#5f7dd0"};
    const tk=c._ticket?`<span class="pill" style="background:${tcol[c._ticket]||'#444'};color:#000;font-weight:700">${esc(c._ticket.toUpperCase())}</span>`:"";
    const pa=c._presu?`<span class="pill" style="background:#15391f;color:#5fd07f">presupuesto+</span>`:"";
    const meta=`<span class="muted" style="font-weight:400;font-size:12px;display:flex;gap:4px;align-items:center">${tk}${pa}${esc(c._obj||"")}</span>`;
    return `<button class="cliBtn ${SEL===c.user_id?'sel':''}" onclick="verCliente('${c.user_id}')"><div style="display:flex;justify-content:space-between;align-items:center"><span>${ic} ${esc(c.nombre||c.user_id.slice(0,8))}</span>${meta}</div>${inact}${rs}${ms}</button>`;
  }).join("")||'<div class="muted">Sin clientes aún.</div>';
}

async function verCliente(id){
  SEL=id;renderClientes();$("detalle").innerHTML='<div class="card">Cargando…</div>';
  const wk=weekId(),d7=hace(7);
  const d28=hace(28);
  // Lunes-domingo de la semana actual (para macros por día / refeeds).
  const luSem=wk;const doSem=(()=>{const d=new Date(luSem+"T00:00:00");d.setDate(d.getDate()+6);return d.toISOString().slice(0,10);})();
  const [obj,susc,pln,ck,jr,cm,fts,pes,meds,ser,rut,sue,pc,reg,intk,per,cic,ses,mac,atl]=await Promise.all([
    sb.from("objetivos").select("*").eq("user_id",id).maybeSingle(),
    sb.from("suscripciones").select("estado,tier,prox_cobro,stripe_customer_id").eq("user_id",id).maybeSingle(),

    h+=PC.map(x=>`<div class="fila"><span><b>${esc(x.momento||'Comida')}</b> <span class="muted" style="font-size:12px">${esc(x.descripcion||'')}</span></span><span style="white-space:nowrap"><span class="muted" style="font-size:12px">${Math.round(x.kcal||0)} kcal · P${Math.round(x.prot||0)}/C${Math.round(x.carb||0)}/G${Math.round(x.fat||0)}</span> <button class="sm ghost" onclick="borrarComidaPlan('${x.id}','${id}')">×</button></span></div>`).join("");
    const tot=PC.reduce((a,x)=>({k:a.k+(+x.kcal||0),p:a.p+(+x.prot||0),c:a.c+(+x.carb||0),f:a.f+(+x.fat||0)}),{k:0,p:0,c:0,f:0});
    h+=`<div class="fila"><b>Total del día</b><b>${Math.round(tot.k)} kcal · P${Math.round(tot.p)}/C${Math.round(tot.c)}/G${Math.round(tot.f)}</b></div>`;
  } else h+=`<div class="muted">Sin comidas aún. Créalas abajo por momento (desayuno, almuerzo, etc.).</div>`;
  RECUID=id;
  h+=`<h3>Crear receta / comida (ingredientes + gramaje)</h3>
   <div class="muted" style="font-size:12px;margin-bottom:6px">Escribe los ingredientes y sus gramos; la plataforma calcula kcal y macros automáticamente. Luego guárdala como receta o agrégala al plan del cliente (aparece en su app).</div>
   <input id="rc_nom" placeholder="Nombre (ej: Bowl de pollo y arroz)">
   <div id="rc_ings" style="margin-top:6px"></div>
   <div class="row" style="margin-top:4px"><div><button class="sm ghost" onclick="rcAddRow()">+ Ingrediente</button></div><div><button class="sm" onclick="rcCalcular()">Calcular calorías</button></div><div><span id="rcMsg" class="muted"></span></div></div>
   <div id="rc_res" style="margin-top:8px"></div>`;
  // Journal
  h+=`<h3>Journal reciente (personal)</h3>`;
  h+=J.length?J.map(j=>`<div style="border-left:2px solid var(--line);padding-left:10px;margin:6px 0"><div class="muted" style="font-size:11px">${esc(j.fecha)}</div>${esc(j.texto)}</div>`).join(""):`<div class="muted">Sin entradas.</div>`;
  // Fotos
  const F=fts.data||[];h+=`<h3>Fotos comparativas</h3>`;
  if(F.length){h+=`<div class="row"><div><div class="muted" style="font-size:11px">Primera (${esc(F[0].fecha)})</div>${F[0].url?`<img class="foto" src="${esc(F[0].url)}">`:''}</div>${F.length>1?`<div><div class="muted" style="font-size:11px">Última (${esc(F[F.length-1].fecha)})</div>${F[F.length-1].url?`<img class="foto" src="${esc(F[F.length-1].url)}">`:''}</div>`:''}</div>`;}else h+=`<div class="muted">Sin fotos.</div>`;
  h+=`</div>`;

  // Macros por día y refeeds (override del objetivo base por fecha)
  {
    const base={kcal:+o.kcal||0,prot:+o.prot||0,carb:+o.carb||0,fat:+o.fat||0};
    const pesoAct=peso!=null?+peso:(o.peso!=null?+o.peso:null);
    const act=+o.actividad||1;
    // Override por fecha
    const ovr={};(mac.data||[]).forEach(m=>{ovr[m.fecha]=m;});
    const DIAS=["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
    const fechasSem=[];for(let i=0;i<7;i++){const d=new Date(luSem+"T00:00:00");d.setDate(d.getDate()+i);fechasSem.push(d.toISOString().slice(0,10));}
    const hoy=hace(0);
    // Macros efectivos de un día (override o base)
    const macroDia=f=>{const m=ovr[f];return m?{kcal:+m.kcal||0,prot:+m.prot||0,carb:+m.carb||0,fat:+m.fat||0,tipo:m.tipo,nota:m.nota,over:true}:{...base,over:false};};
    // Detección de déficit
    const enDeficit=(o.tipo==='def')||(base.kcal>0&&pesoAct!=null&&base.kcal<(Math.round(pesoAct*22*act)-100));
    // Señales de refeed
    const senales=[];
    if(fatAvg!=null&&+fatAvg>=7)senales.push("fatiga "+fatAvg);
    if(enAvg!=null&&+enAvg<=4)senales.push("energía "+enAvg);
    if(sprom!=null&&sprom<6)senales.push("sueño "+sprom.toFixed(1)+"h");
    const aniAvg=avgCk('animo');
    if(aniAvg!=null&&+aniAvg<=4)senales.push("ánimo "+aniAvg);
    const sugiere=enDeficit&&senales.length>=2;
    // Refeed calculado (previsualización de "Aplicar refeed")
    const refeedCalc=pesoAct!=null?(()=>{const kc=Math.round(base.kcal*1.25);const pr=Math.round(base.prot);const ft=Math.round(0.55*pesoAct);const cb=Math.round(Math.max(0,kc-pr*4-ft*9)/4);return{kcal:kc,prot:pr,carb:cb,fat:ft};})():null;

    h+=`<div class="card"><h2 style="margin-top:0">Macros por día y refeeds</h2>`;
    // Banner de sugerencia
    if(sugiere)h+=`<div style="border:1px solid var(--rojo);background:#2a1414;color:var(--bad);border-radius:8px;padding:8px 10px;margin-bottom:8px">Sugerencia: refeed — señales: ${esc(senales.join(", "))}. Cliente en déficit.</div>`;
    else h+=`<div class="muted" style="font-size:12px;margin-bottom:8px">Sin señales de refeed${enDeficit?'':' (cliente no está en déficit)'}.</div>`;
    if(!base.kcal)h+=`<div class="muted" style="font-size:12px;margin-bottom:8px">No hay objetivo base de calorías configurado; define kcal/macros arriba para promediar y calcular refeeds.</div>`;
    // Tabla de los 7 días
    h+=`<table><tr><th>Día</th><th>Tipo</th><th>Kcal · P/C/G</th></tr>`;
    const sum={kcal:0,prot:0,carb:0,fat:0};
    fechasSem.forEach((f,i)=>{
      const d=macroDia(f);sum.kcal+=d.kcal;sum.prot+=d.prot;sum.carb+=d.carb;sum.fat+=d.fat;
      const et=d.over?(d.tipo==='refeed'?'<span class="pill" style="background:var(--rojo);color:#fff;font-weight:700">REFEED</span>':d.tipo==='bajo'?'<span class="pill" style="background:#5f7dd0;color:#000;font-weight:700">Bajo</span>':'<span class="pill" style="background:var(--warn);color:#000;font-weight:700">Custom</span>'):'<span class="muted" style="font-size:11px">base</span>';
      h+=`<tr${f===hoy?' style="background:#1d1d20"':''}><td>${DIAS[i]} <span class="muted" style="font-size:11px">${esc(f.slice(5))}</span></td><td>${et}</td><td>${d.kcal} kcal · P${d.prot}/C${d.carb}/G${d.fat}</td></tr>`;
    });
    h+=`</table>`;
    // Promedio semanal
    h+=`<div class="fila" style="margin-top:6px"><b>Promedio semanal</b><b>${Math.round(sum.kcal/7)} kcal · P${Math.round(sum.prot/7)}/C${Math.round(sum.carb/7)}/G${Math.round(sum.fat/7)}</b></div>`;
    // Controles para aplicar
    h+=`<h3>Aplicar a un día</h3>`;
    h+=`<label class="lbl">Fecha</label><select id="md_fecha">${fechasSem.map((f,i)=>`<option value="${f}" ${f===hoy?'selected':''}>${DIAS[i]} ${esc(f)}${f===hoy?' (hoy)':''}</option>`).join("")}</select>`;
    h+=`<div class="row" style="margin-top:6px"><div><button class="sm" onclick="aplicarRefeed('${id}')">Aplicar refeed</button></div><div><button class="sm ghost" onclick="quitarMacrosDia('${id}')">Normal (quitar)</button></div></div>`;
    if(refeedCalc)h+=`<div class="muted" style="font-size:12px;margin-top:4px">Refeed calculado (peso ${pesoAct} kg): ${refeedCalc.kcal} kcal · P${refeedCalc.prot}/C${refeedCalc.carb}/G${refeedCalc.fat}. Carbohidratos idealmente antes de entrenar.</div>`;
    else h+=`<div class="muted" style="font-size:12px;margin-top:4px">Falta peso reciente para calcular el refeed.</div>`;
    h+=`<h3>Custom (macros manuales)</h3>`;
    h+=`<div class="row"><div><label class="lbl">Kcal</label><input id="md_kcal" type="number" value="${base.kcal||''}"></div><div><label class="lbl">Prot</label><input id="md_prot" type="number" value="${base.prot||''}"></div><div><label class="lbl">Carb</label><input id="md_carb" type="number" value="${base.carb||''}"></div><div><label class="lbl">Grasa</label><input id="md_fat" type="number" value="${base.fat||''}"></div></div>`;
    h+=`<button class="sm" style="margin-top:6px" onclick="guardarCustomMacros('${id}')">Guardar custom</button> <span id="mdMsg" class="muted"></span></div>`;
  }

  // Informe mensual (automático + seguimiento del entrenador)
  h+=`<div class="card"><h2 style="margin-top:0">Informe mensual</h2>
    <div class="muted" style="margin-bottom:6px">Genera el informe automático del mes (datos reales + conclusiones por IA). Para clientes con acompañamiento, añade observaciones de WhatsApp y capturas como evidencia; luego publícalo (le llega notificación a la app). Si no añades seguimiento, el informe sale igual, sin esa sección.</div>
    <button onclick="generarInforme('${id}')">Generar / actualizar</button> <span id="infMsg" class="muted"></span>
    <div id="infArea" class="hide" style="margin-top:10px">
      <label class="lbl">Observaciones de seguimiento (una por línea)</label>
      <textarea id="inf_seg" rows="4" placeholder="Respondió tarde varios días. No avisó antes de 2 salidas..."></textarea>
      <label class="lbl">Capturas de WhatsApp (evidencia de cumplimiento)</label>
      <input id="inf_file" type="file" accept="image/*" onchange="subirCaptura('${id}')">
      <div id="inf_shots" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px"></div>
      <div class="row" style="margin-top:10px">
        <div><button class="ghost" onclick="guardarSeg('${id}')">Guardar seguimiento</button></div>
        <div><button onclick="publicarInforme('${id}')">Publicar y notificar</button></div>
        <div><button class="ghost" onclick="descargarInformePDF()">Ver / descargar PDF</button></div>
      </div>
      <iframe id="inf_prev" style="width:100%;height:520px;border:1px solid var(--line);border-radius:8px;margin-top:10px;background:#fff"></iframe>
    </div></div>`;

  // Plan de alimentación (PDF, mismo diseño de los informes)
  h+=`<div class="card"><h2 style="margin-top:0">Plan de alimentación</h2>
    <div class="muted" style="margin-bottom:6px">Genera el plan de comidas del cliente (alimentos, gramos, macros y guía por IA) con el diseño de los informes. Revísalo aquí al instante y véelo o descárgalo como PDF.</div>
    <button onclick="generarPlanAlim('${id}')">Generar / revisar plan</button>
    <button class="ghost" onclick="descargarPlanPDF()">Ver / descargar PDF</button>
    <span id="planMsg" class="muted"></span>
    <iframe id="plan_prev" class="hide" style="width:100%;height:520px;border:1px solid var(--line);border-radius:8px;margin-top:10px;background:#fff"></iframe>
  </div>`;

  $("detalle").innerHTML=h;
  recetaRender();rcInit();hacerColapsables();
}
// Hace cada tarjeta del detalle un desplegable (clic en el título) para no verse invasivo.
function hacerColapsables(){
  document.querySelectorAll("#detalle > .card").forEach((card,idx)=>{
    const h=card.querySelector("h2");if(!h||h.dataset.col)return;h.dataset.col="1";
    const cont=document.createElement("div");
    const kids=[];let n=h.nextSibling;while(n){kids.push(n);n=n.nextSibling;}
    kids.forEach(k=>cont.appendChild(k));card.appendChild(cont);
    const abierta=idx===0; cont.style.display=abierta?"block":"none";
    h.style.cursor="pointer";h.style.userSelect="none";
    const flecha=document.createElement("span");flecha.style.cssText="float:right;color:var(--muted);font-size:13px";flecha.textContent=abierta?"▾":"▸";h.appendChild(flecha);
    h.addEventListener("click",()=>{const ab=cont.style.display==="none";cont.style.display=ab?"block":"none";flecha.textContent=ab?"▾":"▸";});
  });
}

// ---------- Constructor de recetas por ingredientes + gramaje (cálculo IA) ----------
let RC_RESULT=null;
function rcInit(){RC_RESULT=null;const el=$("rc_ings");if(!el)return;el.innerHTML="";rcAddRow();rcAddRow();rcAddRow();}
function rcAddRow(nombre,gramos){
  const el=$("rc_ings");if(!el)return;
  const div=document.createElement('div');div.className='row';div.style.marginBottom='4px';
  div.innerHTML=`<div style="flex:2"><input class="rc_ing" placeholder="ingrediente (ej: pechuga de pollo)" value="${esc(nombre||'')}"></div><div style="flex:1"><input class="rc_g" type="number" placeholder="gramos" value="${gramos!=null?gramos:''}"></div><div style="flex:0"><button class="sm ghost" onclick="this.closest('.row').remove()">×</button></div>`;
  el.appendChild(div);
}
async function rcCalcular(){
  const rows=[...document.querySelectorAll('#rc_ings .row')].map(r=>({n:(r.querySelector('.rc_ing').value||'').trim(),g:parseFloat(r.querySelector('.rc_g').value)})).filter(x=>x.n&&x.g>0);
  if(!rows.length){$("rcMsg").textContent="Agrega al menos un ingrediente con sus gramos.";return;}
  $("rcMsg").textContent="Calculando con IA…";
  const desc=rows.map(x=>`${x.g} g de ${x.n}`).join(", ");
  const {data,error}=await sb.functions.invoke("nutricion-ia",{body:{descripcion:desc,tipo:'plato'}});
  if(error||!data||data.error){$("rcMsg").innerHTML=`<span class="alert">${esc((error&&error.message)||(data&&data.error)||'No se pudo calcular.')}</span>`;return;}
  RC_RESULT=data;$("rcMsg").textContent="";rcRender();
}
function rcRender(){
  const el=$("rc_res");if(!el)return;const d=RC_RESULT;if(!d){el.innerHTML="";return;}
  const t=d.total||{};
  let h=`<table><tr><th>Ingrediente</th><th>g</th><th>kcal</th><th>P</th><th>C</th><th>G</th></tr>`;
  (d.items||[]).forEach(i=>{h+=`<tr><td>${esc(i.nombre)}</td><td>${Math.round(i.gramos||0)}</td><td>${Math.round(i.kcal||0)}</td><td>${Math.round(i.prot||0)}</td><td>${Math.round(i.carb||0)}</td><td>${Math.round(i.fat||0)}</td></tr>`;});
  h+=`<tr><td><b>Total</b></td><td></td><td><b>${Math.round(t.kcal||0)}</b></td><td><b>${Math.round(t.prot||0)}</b></td><td><b>${Math.round(t.carb||0)}</b></td><td><b>${Math.round(t.fat||0)}</b></td></tr></table>`;
  if(d.nota)h+=`<div class="muted" style="font-size:12px;margin-top:4px">${esc(d.nota)}</div>`;
  h+=`<div class="row" style="margin-top:8px;align-items:center"><div style="flex:0;min-width:130px"><select id="rc_momento"><option>Desayuno</option><option selected>Almuerzo</option><option>Cena</option><option>Snack</option></select></div><div><button class="sm" onclick="rcGuardarReceta()">Guardar como receta</button></div><div><button class="sm ghost" onclick="rcAddPlan()">Agregar al plan del cliente</button></div></div><div id="rcMsg2" class="muted" style="margin-top:4px"></div>`;
  el.innerHTML=h;
}
async function rcGuardarReceta(){
  if(!RC_RESULT){return;}
  const nom=($("rc_nom").value||"").trim();if(!nom){$("rcMsg2").textContent="Ponle nombre a la receta.";return;}
  const t=RC_RESULT.total||{};const ing=(RC_RESULT.items||[]).map(i=>`${Math.round(i.gramos||0)}g ${i.nombre}`).join(", ");
  const {error}=await sb.from("recetas").insert({owner:MIID,nombre:nom,ingredientes:ing,tipo:$("rc_momento").value,kcal:Math.round(t.kcal||0),prot:Math.round(t.prot||0),carb:Math.round(t.carb||0),fat:Math.round(t.fat||0),comunidad:false});
  $("rcMsg2").innerHTML=error?`<span class="alert">${esc(error.message)}</span>`:"✓ Receta guardada (queda en tu biblioteca de recetas).";
}
async function rcAddPlan(){
  if(!RC_RESULT||!RECUID){$("rcMsg2").textContent="Primero calcula la receta.";return;}
  const t=RC_RESULT.total||{};
  const ing=(RC_RESULT.items||[]).map(i=>`${Math.round(i.gramos||0)}g ${i.nombre}`).join(", ");
  const nom=($("rc_nom").value||"").trim();const desc=nom?`${nom}: ${ing}`:ing;
  const {error}=await sb.from("plan_comidas").insert({user_id:RECUID,momento:$("rc_momento").value,descripcion:desc,kcal:Math.round(t.kcal||0),prot:Math.round(t.prot||0),carb:Math.round(t.carb||0),fat:Math.round(t.fat||0)});
  if(error){$("rcMsg2").innerHTML=`<span class="alert">${esc(error.message)}</span>`;return;}
  verCliente(RECUID);
}
async function borrarComidaPlan(id,cli){
  if(!confirm('¿Quitar esta comida del plan del cliente?'))return;
  const {error}=await sb.from("plan_comidas").delete().eq("id",id);
  if(error){alert(error.message);return;}
  verCliente(cli);
}

// ---------- Informe mensual ----------
function infPreview(){const f=$("inf_prev");if(f)f.srcdoc=INF_HTML;}
function renderShots(){const el=$("inf_shots");if(!el)return;el.innerHTML=INF_SHOTS.map((s,i)=>`<div style="width:120px"><img src="${esc(s.url)}" style="width:120px;height:120px;object-fit:cover;border-radius:8px;border:1px solid var(--line)"><input data-i="${i}" class="shotNota" placeholder="nota (opcional)" value="${esc(s.nota||'')}" style="font-size:11px;padding:5px"><button class="sm ghost" style="width:100%" onclick="quitarShot(${i})">Quitar</button></div>`).join("");}
function quitarShot(i){INF_SHOTS.splice(i,1);renderShots();}
function leerNotas(){document.querySelectorAll(".shotNota").forEach(inp=>{const i=+inp.dataset.i;if(INF_SHOTS[i])INF_SHOTS[i].nota=inp.value;});}
async function generarInforme(id){
  $("infMsg").textContent="Generando informe (datos + IA)…";
  const {data,error}=await sb.functions.invoke("informe",{body:{action:"generar",user_id:id}});
  if(error||!data||data.error){$("infMsg").innerHTML=`<span class="alert">${esc((error&&error.message)||(data&&data.error)||"error")}</span>`;return;}
  INF_MES=data.mes;INF_HTML=data.html||"";const seg=data.seguimiento||{};INF_SHOTS=Array.isArray(seg.screenshots)?seg.screenshots:[];
  show("infArea",true);$("inf_seg").value=(Array.isArray(seg.texto)?seg.texto:[]).join("\n");
  renderShots();infPreview();$("infMsg").textContent="✓ Generado"+(data.publicado?" (publicado)":" (borrador)");
}
async function subirCaptura(id){
  const inp=$("inf_file");const f=inp.files&&inp.files[0];if(!f)return;
  $("infMsg").textContent="Subiendo captura…";
  const ext=(f.name.split(".").pop()||"jpg").toLowerCase().replace(/[^a-z0-9]/g,"")||"jpg";
  const ruta=MIID+"/"+Date.now()+"-"+Math.round(Math.random()*1e6)+"."+ext;
  const up=await sb.storage.from("informes-soportes").upload(ruta,f,{upsert:true,contentType:f.type||"image/jpeg"});
  if(up.error){$("infMsg").innerHTML=`<span class="alert">${esc(up.error.message)}</span>`;return;}
  const {data:su}=await sb.storage.from("informes-soportes").createSignedUrl(ruta,60*60*24*365);
  INF_SHOTS.push({url:su?su.signedUrl:"",nota:""});renderShots();inp.value="";$("infMsg").textContent="✓ Captura añadida (recuerda Guardar seguimiento).";
}
async function guardarSeg(id){
  leerNotas();
  const texto=$("inf_seg").value.split("\n").map(s=>s.trim()).filter(Boolean);
  $("infMsg").textContent="Guardando seguimiento…";
  const {data,error}=await sb.functions.invoke("informe",{body:{action:"guardar-seguimiento",user_id:id,mes:INF_MES,seguimiento:{texto,screenshots:INF_SHOTS}}});
  if(error||!data||data.error){$("infMsg").innerHTML=`<span class="alert">${esc((error&&error.message)||(data&&data.error)||"error")}</span>`;return;}
  INF_HTML=data.html||INF_HTML;infPreview();$("infMsg").textContent="✓ Seguimiento guardado.";
}
async function publicarInforme(id){
  $("infMsg").textContent="Publicando…";
  const {data,error}=await sb.functions.invoke("informe",{body:{action:"publicar",user_id:id,mes:INF_MES}});
  if(error||!data||data.error){$("infMsg").innerHTML=`<span class="alert">${esc((error&&error.message)||(data&&data.error)||"error")}</span>`;return;}
  INF_HTML=data.html||INF_HTML;infPreview();$("infMsg").textContent="✓ Publicado. Al cliente le llegó la notificación.";
}
function descargarInformePDF(){if(!INF_HTML){alert("Genera el informe primero.");return;}const w=window.open("","_blank");w.document.write(INF_HTML);w.document.close();setTimeout(()=>w.print(),600);}

// Opciones de ejercicio: TODOS los ejercicios, agrupados por grupo muscular
// (el grupo del slot aparece primero). Libertad total de elección.
function opcionesEj(selId, slotGrupo){
  const byG={};
  EJ.forEach(e=>{const g=e.grupo||'Otros';(byG[g]=byG[g]||[]).push(e);});
  const groups=Object.keys(byG).sort((a,b)=>a===slotGrupo?-1:(b===slotGrupo?1:a.localeCompare(b)));
  return groups.map(g=>`<optgroup label="${esc(g)}${g===slotGrupo?' — objetivo':''}">`+
    byG[g].slice().sort((x,y)=>(x.nombre||'').localeCompare(y.nombre||''))
      .map(e=>`<option value="${e.id}" ${String(e.id)===String(selId)?'selected':''}>${esc(cap(e.nombre))}</option>`).join('')
    +`</optgroup>`).join('');
}
// Al cambiar el ejercicio, rellena reps/RIR de la fila con los de ese ejercicio.
function ejChange(sel){

  const pill=row.querySelector('span');if(pill)pill.innerHTML=fatPill(e);
}

  RUT.dias.forEach((d,di)=>{
    const items=d.orden||[];

      const GRID='display:grid;grid-template-columns:minmax(140px,2fr) 62px 50px 50px 50px 108px 42px 30px;gap:6px;align-items:center;margin:4px 2px';

          <input class="rutRmin" type="number" placeholder="mín" value="${ex.rep_min!=null?ex.rep_min:''}" title="Reps mínimas" style="margin:0;text-align:center">
          <input class="rutRmax" type="number" placeholder="máx" value="${ex.rep_max!=null?ex.rep_max:''}" title="Reps máximas" style="margin:0;text-align:center">
          <input class="rutRir" type="number" placeholder="RIR" value="${ex.rir!=null?ex.rir:''}" title="RIR (reps en reserva)" style="margin:0;text-align:center">
          <select data-d="${di}" data-i="${ii}" class="rutTec" style="min-width:0;margin:0">${TECNICAS.map(t=>`<option value="${t[0]}" ${tk===t[0]?'selected':''}>${t[1]}</option>`).join("")}</select>

        </div>`;
      });
    } else { h+=`<div class="muted" style="font-size:12px;margin:4px 0">Sin ejercicios en este día.</div>`; }
    h+=`<button class="sm ghost" onclick="rutAgregar(${di})" style="margin-top:2px">+ Agregar ejercicio</button>`;

// ---- Importar rutina desde Excel (SheetJS -> IA -> vista previa -> guardar) ----
async function importarExcel(cli){
  const f=$("impFile").files[0]; if(!f)return;
  IMPORT_DIAS=null; $("impPrev").innerHTML=""; $("impMsg").textContent="Leyendo el archivo…";
  let texto="";
  try{
    const buf=await f.arrayBuffer();
    const wb=XLSX.read(buf,{type:"array"});
    wb.SheetNames.forEach(n=>{ texto+=XLSX.utils.sheet_to_csv(wb.Sheets[n])+"\n"; });
  }catch(e){ $("impMsg").textContent="No pude leer el archivo: "+e.message; return; }
  if(texto.trim().length<20){ $("impMsg").textContent="El archivo está vacío o no se pudo leer."; return; }
  $("impMsg").textContent="Interpretando la rutina con IA… (unos segundos)";
  const {data,error}=await sb.functions.invoke("rutina-import",{body:{texto}});
  if(error||(data&&data.error)){ $("impMsg").textContent="Error: "+((data&&data.error)||error.message); return; }
  IMPORT_DIAS=data.dias||[];
  $("impMsg").textContent=(data.nota?esc(data.nota)+" · ":"")+IMPORT_DIAS.length+" día(s) detectado(s). Revisa la vista previa y guarda.";
  renderImportPrev(cli);
}
function renderImportPrev(cli){
  if(!IMPORT_DIAS||!IMPORT_DIAS.length){$("impPrev").innerHTML="";return;}
  let h="";
  IMPORT_DIAS.forEach(d=>{
    h+=`<div style="margin:8px 0"><b>${esc(d.nombre)}</b> <span class="muted">(${esc((d.grupos||[]).join(", "))})</span>`;
    (d.ejercicios||[]).forEach(e=>{ h+=`<div class="fila"><span>${esc(e.nombre)}</span><span class="muted">${e.series}x ${e.rep_min}-${e.rep_max} · RIR ${e.rir}${e.tecnica&&e.tecnica!=='normal'?' · '+esc(e.tecnica):''}</span></div>`; });
    h+=`</div>`;
  });
  h+=`<button onclick="guardarRutinaImport('${cli}')">Guardar esta rutina para el cliente</button> <span id="impSave" class="muted"></span>
     <div class="muted" style="font-size:11px;margin-top:6px">Al guardar se crean los ejercicios y se reemplaza la rutina actual del cliente. Podrás afinar todo abajo en "Editar rutina".</div>`;
  $("impPrev").innerHTML=h;
}
async function guardarRutinaImport(cli){
  if(!IMPORT_DIAS||!IMPORT_DIAS.length)return;
  $("impSave").textContent="Guardando…";
  // 1) Ejercicios únicos por nombre.
  const uniq={};
  IMPORT_DIAS.forEach(d=>(d.ejercicios||[]).forEach(e=>{const k=(e.nombre||"").trim().toLowerCase();if(k&&!uniq[k])uniq[k]={nombre:e.nombre.trim(),grupo:e.grupo,rep_min:e.rep_min,rep_max:e.rep_max,rir:e.rir};}));
  const filas=Object.values(uniq).map(e=>({nombre:e.nombre,grupo:e.grupo,equipo:"Máquina",rep_min:e.rep_min,rep_max:e.rep_max,rir:e.rir,fatiga:"media",estiramiento:false,entrenador_id:MIID}));
  const ins=await sb.from("ejercicios").insert(filas).select("id,nombre");
  if(ins.error){ $("impSave").textContent="Error creando ejercicios: "+ins.error.message; return; }
  const idmap={}; ins.data.forEach(r=>idmap[(r.nombre||"").trim().toLowerCase()]=r.id);
  // 2) Construir días + técnicas.
  const dias=[],tecnicas={};
  IMPORT_DIAS.forEach((d,di)=>{
    const orden=[];
    (d.ejercicios||[]).forEach(e=>{const eid=idmap[(e.nombre||"").trim().toLowerCase()];if(!eid)return;orden.push({id:eid,g:e.grupo,s:e.series});if(e.tecnica&&e.tecnica!=="normal")tecnicas[di+"|"+eid]=e.tecnica;});
    dias.push({nombre:d.nombre,grupos:d.grupos||[],orden});
  });
  // 3) Guardar rutina + ajustar días del plan.
  const r1=await sb.from("rutinas").upsert({user_id:cli,dias,tecnicas},{onConflict:"user_id"});
  if(r1.error){ $("impSave").textContent="Error guardando la rutina: "+r1.error.message; return; }
  await sb.from("planes").update({dias:dias.length}).eq("user_id",cli);
  $("impSave").textContent="✓ Rutina guardada. El cliente ya puede registrarla.";
  IMPORT_DIAS=null; setTimeout(()=>verCliente(cli),1000);
}

// Sincroniza lo escrito en el editor a memoria (RUT) antes de re-renderizar.
function syncEditorAMemoria(){
  if(!RUT||!RUT.dias)return;
  document.querySelectorAll(".rutSel").forEach(s=>{const di=+s.dataset.d,ii=+s.dataset.i;if(RUT.dias[di]&&RUT.dias[di].orden&&RUT.dias[di].orden[ii])RUT.dias[di].orden[ii].id=s.value;});
  document.querySelectorAll(".rutSer").forEach(s=>{const di=+s.dataset.d,ii=+s.dataset.i;const it=RUT.dias[di]&&RUT.dias[di].orden&&RUT.dias[di].orden[ii];if(it){const v=parseInt(s.value);if(v>0)it.s=v;else delete it.s;}});
  RUT.tecnicas=RUT.tecnicas||{};
  document.querySelectorAll(".rutTec").forEach(s=>{const di=+s.dataset.d,ii=+s.dataset.i;const it=RUT.dias[di]&&RUT.dias[di].orden&&RUT.dias[di].orden[ii];if(it){const key=di+"|"+it.id;if(s.value&&s.value!=="normal")RUT.tecnicas[key]=s.value;else delete RUT.tecnicas[key];}});
}
function rutRefrescar(){const el=$("editorRut");if(el)el.innerHTML=editorRutinaHTML();}
function rutQuitar(di,ii){syncEditorAMemoria();if(RUT.dias[di]&&RUT.dias[di].orden)RUT.dias[di].orden.splice(ii,1);rutRefrescar();$("rutMsg").textContent="Quitaste un ejercicio. Recuerda Guardar rutina.";}
function rutAgregar(di){syncEditorAMemoria();if(!RUT.dias[di].orden)RUT.dias[di].orden=[];const g=(RUT.dias[di].grupos&&RUT.dias[di].grupos[0])||'';const first=EJ[0];RUT.dias[di].orden.push({id:first?first.id:'',g});rutRefrescar();$("rutMsg").textContent="Agregaste un ejercicio. Elígelo y Guarda rutina.";}
async function guardarRutina(id){
  $("rutMsg").textContent="Guardando…";
  const dias=JSON.parse(JSON.stringify(RUT.dias));
  const tec=Object.assign({},RUT.tecnicas||{});
  document.querySelectorAll(".rutSel").forEach(s=>{const di=+s.dataset.d,ii=+s.dataset.i;if(dias[di]&&dias[di].orden&&dias[di].orden[ii])dias[di].orden[ii].id=s.value;});
  document.querySelectorAll(".rutSer").forEach(s=>{const di=+s.dataset.d,ii=+s.dataset.i;if(dias[di]&&dias[di].orden&&dias[di].orden[ii]){const v=parseInt(s.value);if(v>0)dias[di].orden[ii].s=v;else delete dias[di].orden[ii].s;}});
  document.querySelectorAll(".rutTec").forEach(s=>{const di=+s.dataset.d,ii=+s.dataset.i;const it=dias[di]&&dias[di].orden&&dias[di].orden[ii];if(it){const key=di+"|"+it.id;if(s.value&&s.value!=="normal")tec[key]=s.value;else delete tec[key];}});
  const {error}=await sb.from("rutinas").update({dias,tecnicas:tec}).eq("user_id",id);
  if(error){$("rutMsg").innerHTML=`<span class="alert">${esc(error.message)}</span>`;return;}
  RUT.dias=dias;RUT.tecnicas=tec;
  // Reps (mín/máx) y RIR: se guardan en el ejercicio (aplican en la app).
  const ejUpd={};
  document.querySelectorAll(".rutSel").forEach(s=>{
    const row=s.parentElement, exId=s.value, patch={};
    const rmin=row.querySelector('.rutRmin'), rmax=row.querySelector('.rutRmax'), rir=row.querySelector('.rutRir');
    if(rmin&&rmin.value!=='')patch.rep_min=parseInt(rmin.value);
    if(rmax&&rmax.value!=='')patch.rep_max=parseInt(rmax.value);
    if(rir&&rir.value!=='')patch.rir=parseInt(rir.value);
    if(Object.keys(patch).length)ejUpd[exId]=patch;
  });
  let nEj=0;
  for(const id2 of Object.keys(ejUpd)){
    const {error:e2}=await sb.from("ejercicios").update(ejUpd[id2]).eq("id",id2);
    if(!e2){const e=EJ.find(x=>String(x.id)===String(id2));if(e)Object.assign(e,ejUpd[id2]);nEj++;}
  }
  $("rutMsg").textContent=`✓ Rutina actualizada (series, técnica y ${nEj} ejercicio(s) con reps/RIR aplicados a la app).`;
}

async function aplicarRefeed(id){
  const fecha=$("md_fecha")?$("md_fecha").value:hace(0);
  $("mdMsg").textContent="Aplicando…";
  const {data:o,error:eo}=await sb.from("objetivos").select("kcal,prot").eq("user_id",id).maybeSingle();
  if(eo){$("mdMsg").innerHTML=`<span class="alert">${esc(eo.message)}</span>`;return;}
  const {data:pe}=await sb.from("pesos").select("peso").eq("user_id",id).order("fecha",{ascending:false}).limit(1);
  const pesoAct=(pe&&pe[0]&&pe[0].peso!=null)?+pe[0].peso:null;
  if(pesoAct==null){$("mdMsg").innerHTML=`<span class="alert">Falta peso reciente del cliente para calcular el refeed.</span>`;return;}
  const baseKcal=+(o&&o.kcal)||0,baseProt=+(o&&o.prot)||0;
  const kcal=Math.round(baseKcal*1.25);const prot=Math.round(baseProt);const fat=Math.round(0.55*pesoAct);const carb=Math.round(Math.max(0,kcal-prot*4-fat*9)/4);
  const {error}=await sb.from("macros_dia").upsert({user_id:id,fecha,tipo:'refeed',kcal,prot,carb,fat,nota:'Carbohidratos idealmente antes de entrenar',origen:'entrenador'},{onConflict:"user_id,fecha"});
  if(error){$("mdMsg").innerHTML=`<span class="alert">${esc(error.message)}</span>`;return;}
  await verCliente(id);
}

     <div class="muted" style="font-size:12px;margin-bottom:6px">Para subir <b>frecuencia</b> prefiere fatiga <b>baja</b> y sin énfasis de estiramiento (recuperan más rápido). Si detectas mucha fatiga, cambia por una variante de menor fatiga.</div>
     <input id="x_buscar" placeholder="Buscar…" oninput="renderEj()">
     <div class="row"><div><select id="x_ffat" onchange="renderEj()"><option value="">Toda fatiga</option><option value="baja">Fatiga baja</option><option value="media">Fatiga media</option><option value="alta">Fatiga alta</option></select></div><div><select id="x_festir" onchange="renderEj()"><option value="">Estiramiento: todos</option><option value="si">Enfatiza estiramiento</option><option value="no">Sin énfasis</option></select></div></div>
     <div id="ejlist"></div></div>`;
  $("v-ejercicios").innerHTML=h;renderEj();
}
const FATCOL={alta:"#e23b3b",media:"#e0b84a",baja:"#5fd07f"};
function fatPill(e){const f=e.fatiga||'media';return `<span class="pill" style="background:${FATCOL[f]||'#444'};color:#000;font-weight:700">${esc(f)}</span>${e.estiramiento?' <span class="pill" style="background:#3a2a5a;color:#cdbff0">estira</span>':''}`;}
function renderEj(){
  const q=($("x_buscar")?$("x_buscar").value:"").toLowerCase();
  const ff=($("x_ffat")?$("x_ffat").value:"");const fe=($("x_festir")?$("x_festir").value:"");
  const list=EJ.filter(e=>(!q||(e.nombre||"").toLowerCase().includes(q))&&(!ff||(e.fatiga||'media')===ff)&&(!fe||(fe==="si"?!!e.estiramiento:!e.estiramiento)));
  const selFat=e=>`<select onchange="setClasif('${e.id}','fatiga',this.value)" style="padding:3px;font-size:12px;width:auto;margin:0">${['baja','media','alta'].map(f=>`<option value="${f}" ${(e.fatiga||'media')===f?'selected':''}>${f}</option>`).join("")}</select>`;
  const selEst=e=>`<select onchange="setClasif('${e.id}','estiramiento',this.value)" style="padding:3px;font-size:12px;width:auto;margin:0"><option value="no" ${!e.estiramiento?'selected':''}>sin estir.</option><option value="si" ${e.estiramiento?'selected':''}>estira</option></select>`;
  $("ejlist").innerHTML=`<table><tr><th>Ejercicio</th><th>Grupo</th><th>Fatiga</th><th>Estiramiento</th><th>Video</th></tr>${list.map(e=>`<tr><td>${esc(cap(e.nombre))}</td><td class="muted">${esc(e.grupo||'')}</td><td>${selFat(e)}</td><td>${selEst(e)}</td><td>${e.video_url?'✅':'<span class="muted">—</span>'} <button class="sm ghost" onclick="editVid('${e.id}')">${e.video_url?'video':'+ link'}</button> <button class="sm ghost" onclick="borrarEjercicio('${e.id}')" title="Borrar de la biblioteca">🗑</button></td></tr>`).join("")}</table>`;
}
// Cambiar fatiga/estiramiento de un ejercicio (guarda al instante).
async function setClasif(id,campo,valor){
  const patch = campo==='estiramiento' ? {estiramiento: valor==='si'} : {fatiga: valor};
  const {error}=await sb.from("ejercicios").update(patch).eq("id",id);
  if(error){alert(error.message);return;}
  const e=EJ.find(x=>String(x.id)===String(id));if(e)Object.assign(e,patch);
}
async function addEjercicio(){
  const nom=$("x_nom").value.trim();if(!nom){$("xMsg").textContent="Falta el nombre.";return;}
  $("xMsg").textContent="Guardando…";
  const {data,error}=await sb.from("ejercicios").insert({entrenador_id:MIID,nombre:nom,grupo:$("x_grupo").value,equipo:$("x_eq").value,rep_min:+$("x_rmin").value||8,rep_max:+$("x_rmax").value||12,rir:+$("x_rir").value||2,video_url:$("x_vid").value.trim()||null,fatiga:$("x_fat").value,estiramiento:$("x_estir").value==="si"}).select();
  if(error){$("xMsg").innerHTML=`<span class="alert">${esc(error.message)}</span>`;return;}
  EJ.push(data[0]);EJ.sort((a,b)=>(a.nombre||"").localeCompare(b.nombre||""));$("xMsg").textContent="✓ Agregado.";$("x_nom").value=$("x_vid").value="";renderEj();
}
async function borrarEjercicio(id){
  const e=EJ.find(x=>String(x.id)===String(id));if(!e)return;
  if(!confirm('¿Borrar "'+cap(e.nombre)+'" de la biblioteca? No se puede deshacer.'))return;
  const {data,error}=await sb.from("ejercicios").delete().eq("id",id).select();
  if(error){alert(error.message);return;}
  if(!data||!data.length){alert('No se pudo borrar: ese ejercicio lo creó otro entrenador (solo puedes borrar los tuyos).');return;}
  EJ=EJ.filter(x=>String(x.id)!==String(id));renderEj();
}
async function editVid(id){
  const e=EJ.find(x=>String(x.id)===String(id));const url=prompt("Enlace de YouTube para "+cap(e.nombre),e.video_url||"");if(url===null)return;
  const {error}=await sb.from("ejercicios").update({video_url:url.trim()||null}).eq("id",id);
  if(error){alert(error.message);return;}e.video_url=url.trim()||null;renderEj();
}

// PARTE 4b: Alimentos base (catálogo oficial MAM · guía de alimentación)
// Es la BASE del registro del cliente: aparecen primero en su búsqueda.
let AB=[];
const CATS=[["carbohidrato","Carbohidrato"],["carbohidrato_proteina","Carbohidrato + proteína"],["proteina","Proteína"],["proteina_grasa","Proteína + grasa"],["grasa","Grasa"]];
function catLabel(c){const f=CATS.find(x=>x[0]===c);return f?f[1]:(c||"—");}
async function verAlimentos(){
  $("v-alimentos").innerHTML='<div class="card">Cargando…</div>';
  const {data,error}=await sb.from("alimentos_base").select("*").order("nombre");
  if(error){$("v-alimentos").innerHTML=`<div class="card alert">${esc(error.message)}</div>`;return;}
  AB=data||[];
  let h=`<div class="card"><h2 style="margin-top:0">Nuevo alimento</h2>
   <div class="muted" style="margin-bottom:6px">Valores <b>por 100 g</b>, igual que la guía. El cliente lo verá primero al buscar (etiqueta <b>Oficial MAM</b>). Si dejas las kcal en blanco se calculan solas (P×4 + C×4 + G×9).</div>
   <input id="a_nom" placeholder="Nombre tal cual (ej: Pechuga de pollo)">
   <label class="lbl">Categoría</label><select id="a_cat">${CATS.map(c=>`<option value="${c[0]}">${c[1]}</option>`).join("")}</select>
   <div class="row"><div><label class="lbl">Proteína (g)</label><input id="a_p" type="number" step="0.1" value="0"></div><div><label class="lbl">Carbohidrato (g)</label><input id="a_c" type="number" step="0.1" value="0"></div><div><label class="lbl">Grasa (g)</label><input id="a_f" type="number" step="0.1" value="0"></div><div><label class="lbl">Kcal (opcional)</label><input id="a_k" type="number" step="0.1" placeholder="auto"></div></div>
   <button style="margin-top:8px" onclick="addAlimento()">Agregar al catálogo</button> <span id="aMsg" class="muted"></span></div>
   <div class="card"><h2 style="margin-top:0">Catálogo oficial (${AB.length})</h2>
     <input id="a_buscar" placeholder="Buscar…" oninput="renderAB()">
     <select id="a_fcat" onchange="renderAB()"><option value="">Todas las categorías</option>${CATS.map(c=>`<option value="${c[0]}">${c[1]}</option>`).join("")}</select>
     <div id="ablist"></div></div>`;
  $("v-alimentos").innerHTML=h;renderAB();
}
function renderAB(){
  const q=($("a_buscar")?$("a_buscar").value:"").toLowerCase();
  const fc=($("a_fcat")?$("a_fcat").value:"");
  const list=AB.filter(a=>(!q||(a.nombre||"").toLowerCase().includes(q))&&(!fc||a.categoria===fc));
  $("ablist").innerHTML=`<table><tr><th>Alimento</th><th>Categoría</th><th>Kcal</th><th>P</th><th>C</th><th>G</th><th></th></tr>${list.map(a=>`<tr><td><b>${esc(a.nombre)}</b></td><td class="muted">${esc(catLabel(a.categoria))}</td><td>${Math.round(a.k||0)}</td><td>${a.p??0}</td><td>${a.c??0}</td><td>${a.f??0}</td><td><button class="sm ghost" onclick="borrarAlimento('${a.id}')" title="Quitar del catálogo">🗑</button></td></tr>`).join("")}</table>`;
}
async function addAlimento(){
  const nom=$("a_nom").value.trim();if(!nom){$("aMsg").textContent="Falta el nombre.";return;}
  const p=+$("a_p").value||0,c=+$("a_c").value||0,f=+$("a_f").value||0;
  const kIn=$("a_k").value.trim();const k=kIn!==""?(+kIn||0):Math.round(p*4+c*4+f*9);
  $("aMsg").textContent="Guardando…";
  const {data,error}=await sb.from("alimentos_base").insert({nombre:nom,categoria:$("a_cat").value,p,c,f,k,activo:true}).select();
  if(error){$("aMsg").innerHTML=`<span class="alert">${esc(error.message)}</span>`;return;}
  AB.push(data[0]);AB.sort((x,y)=>(x.nombre||"").localeCompare(y.nombre||""));$("aMsg").textContent="✓ Agregado.";$("a_nom").value=$("a_k").value="";$("a_p").value=$("a_c").value=$("a_f").value="0";renderAB();
}
async function borrarAlimento(id){
  const a=AB.find(x=>String(x.id)===String(id));if(!a)return;
  if(!confirm('¿Quitar "'+a.nombre+'" del catálogo oficial? El cliente dejará de verlo al buscar.'))return;
  const {data,error}=await sb.from("alimentos_base").delete().eq("id",id).select();
  if(error){alert(error.message);return;}
  if(!data||!data.length){alert('No se pudo borrar (¿permisos?).');return;}
  AB=AB.filter(x=>String(x.id)!==String(id));renderAB();
}

// PARTE 9: Comunidad / rankings
async function verComunidad(){
  $("v-comunidad").innerHTML='<div class="card">Cargando…</div>';
  const [rec,pts,intt]=await Promise.all([
    sb.from("recetas").select("owner").eq("comunidad",true),
    sb.from("puntos").select("user_id,total,mes"),
    sb.from("intentos").select("user_id,puntos"),
  ]);
  const perfiles={};(await sb.from("perfiles").select("user_id,nombre")).data?.forEach(p=>perfiles[p.user_id]=p.nombre);
  const rc={};(rec.data||[]).forEach(r=>rc[r.owner]=(rc[r.owner]||0)+1);
  const topRec=Object.entries(rc).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const pp={};(intt.data||[]).forEach(i=>pp[i.user_id]=(pp[i.user_id]||0)+(i.puntos||0));(pts.data||[]).forEach(p=>pp[p.user_id]=Math.max(pp[p.user_id]||0,p.total||0));
  const topPts=Object.entries(pp).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const tabla=(arr,unidad)=>arr.length?`<table>${arr.map(([u,n],i)=>`<tr><td>${i+1}. ${esc(perfiles[u]||u.slice(0,8))}</td><td><b>${n}</b> ${unidad}</td></tr>`).join("")}</table>`:'<div class="muted">Sin datos aún.</div>';
  $("v-comunidad").innerHTML=`<div class="card"><h2 style="margin-top:0">🏆 Top recetas subidas</h2>${tabla(topRec,"recetas")}</div><div class="card"><h2 style="margin-top:0">🎯 Top puntos (juego de adivinar)</h2>${tabla(topPts,"pts")}</div><div class="card muted">Reconoce a quienes más aportan: dales un premio o destácalos en la comunidad.</div>`;
}

// PARTE 8: Sugerencias agrupadas
async function verSugerencias(){
  $("v-sugerencias").innerHTML='<div class="card">Cargando…</div>';
  const [fbr,dgr]=await Promise.all([
    sb.from("feedback").select("*").order("created_at",{ascending:false}),
    sb.from("digests").select("*").eq("ambito","app").order("created_at",{ascending:false}).limit(1),
  ]);
  const perfiles={};(await sb.from("perfiles").select("user_id,nombre")).data?.forEach(p=>perfiles[p.user_id]=p.nombre);
  const fb=fbr.data||[];
  const dg=(dgr.data||[])[0];
  const grupos={};fb.forEach(f=>{const t=(f.tema||"General").trim();(grupos[t]=grupos[t]||[]).push(f);});
  // Digest IA (propuestas de mejora automáticas)
  const col={alta:"var(--bad)",media:"var(--warn)",baja:"var(--ok)"};
  let h=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><h2 style="margin:0">🤖 Digest IA · mejoras propuestas</h2><button class="sm" onclick="generarDigest()">Generar ahora</button></div>`;
  if(dg){
    h+=`<div class="muted" style="font-size:12px;margin:4px 0">Actualizado ${esc((dg.fecha||'').toString())} · ${dg.n_feedback||0} feedback analizados</div><p>${esc(dg.resumen||'')}</p>`;
    const props=Array.isArray(dg.propuestas)?dg.propuestas:[];
    h+=props.map(p=>`<div style="border-left:3px solid ${col[p.prioridad]||'var(--line)'};padding-left:10px;margin:8px 0"><div><b>${esc(p.titulo||'')}</b> <span class="pill" style="background:${col[p.prioridad]||'#333'};color:#000">${esc(p.prioridad||'')}</span> <span class="muted">${esc(p.tema||'')}${p.n?' · '+p.n:''}</span></div><div class="muted" style="font-size:13px">${esc(p.descripcion||'')}</div></div>`).join("");
    h+=`<div class="muted" style="font-size:12px;margin-top:8px">Revisa estas propuestas; las que apruebes, las implementamos y publicamos por OTA.</div>`;
  } else {
    h+=`<div class="muted">Aún no hay digest. Corre cada lunes automáticamente, o toca "Generar ahora" (necesita feedback de los usuarios).</div>`;
  }
  h+=`<div id="dgMsg" class="muted" style="margin-top:6px"></div></div>`;
  h+=`<div class="card"><h2 style="margin-top:0">Opiniones y sugerencias (${fb.length})</h2><div class="muted">Agrupadas por tema. Crudo, tal como lo escriben los clientes.</div></div>`;
  if(!fb.length)h+=`<div class="card muted">Aún no hay opiniones. Los clientes las envían desde la app (opinión mensual).</div>`;
  Object.entries(grupos).sort((a,b)=>b[1].length-a[1].length).forEach(([t,arr])=>{
    h+=`<div class="card"><h2 style="margin-top:0">${esc(t)} <span class="muted" style="font-size:12px">(${arr.length})</span></h2>${arr.map(f=>`<div style="border-left:2px solid var(--line);padding-left:10px;margin:6px 0"><div class="muted" style="font-size:11px">${esc(f.fecha||'')} · ${esc(perfiles[f.user_id]||'cliente')} · ${esc(f.tipo||'')}</div>${esc(f.texto)}</div>`).join("")}</div>`;
  });
  $("v-sugerencias").innerHTML=h;
}
async function generarDigest(){
  const el=$("dgMsg"); if(el)el.textContent="Analizando feedback con IA…";
  const {data,error}=await sb.functions.invoke("feedback-digest",{body:{}});
  if(error){if(el)el.innerHTML=`<span class="alert">${esc(error.message)}</span>`;return;}
  if(data&&data.n===0){if(el)el.textContent="Sin feedback nuevo para analizar todavía.";return;}
  verSugerencias();
}

// Mejora interna de la consola: el entrenador da feedback de la plataforma.
const AREAS_INT=["General","Clientes","Rutinas","Nutrición","Informes","Comunidad"];
async function verInterno(){
  $("v-interno").innerHTML='<div class="card">Cargando…</div>';
  const [fbr,dgr]=await Promise.all([
    sb.from("feedback_interno").select("*").order("created_at",{ascending:false}),
    sb.from("digests").select("*").eq("ambito","consola").order("created_at",{ascending:false}).limit(1),
  ]);
  const fb=fbr.data||[];const dg=(dgr.data||[])[0];const col={alta:"var(--bad)",media:"var(--warn)",baja:"var(--ok)"};
  let h=`<div class="card"><h2 style="margin-top:0">Mejorar la consola</h2>
    <div class="muted" style="margin-bottom:6px">Tu espacio para anotar qué te falta o qué mejorar de esta consola. Cada semana la IA agrupa tus notas en mejoras priorizadas y las implementamos por OTA.</div>
    <label class="lbl">Área</label><select id="fi_area">${AREAS_INT.map(a=>`<option>${a}</option>`).join("")}</select>
    <label class="lbl">¿Qué mejorarías o qué falta?</label><textarea id="fi_txt" rows="3" placeholder="Ej: en Clientes, filtrar por ticket. En Informes, editar el veredicto antes de publicar."></textarea>
    <button style="margin-top:8px" onclick="enviarFeedbackInterno()">Enviar</button> <span id="fiMsg" class="muted"></span></div>`;
  h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><h2 style="margin:0">🤖 Revisión semanal de la consola</h2><button class="sm" onclick="generarConsolaDigest()">Generar ahora</button></div>`;
  if(dg){
    h+=`<div class="muted" style="font-size:12px;margin:4px 0">Actualizado ${esc((dg.fecha||dg.created_at||'').toString().slice(0,10))} · ${dg.n_feedback||0} notas</div><p>${esc(dg.resumen||'')}</p>`;
    const props=Array.isArray(dg.propuestas)?dg.propuestas:[];
    h+=props.map(p=>`<div style="border-left:3px solid ${col[p.prioridad]||'var(--line)'};padding-left:10px;margin:8px 0"><div><b>${esc(p.titulo||'')}</b> <span class="pill" style="background:${col[p.prioridad]||'#333'};color:#000">${esc(p.prioridad||'')}</span> <span class="muted">${esc(p.tema||'')}${p.n?' · '+p.n:''}</span></div><div class="muted" style="font-size:13px">${esc(p.descripcion||'')}</div></div>`).join("");
  } else { h+=`<div class="muted">Aún no hay revisión. Corre cada lunes, o toca "Generar ahora" (necesita notas tuyas).</div>`; }
  h+=`<div id="ciMsg" class="muted" style="margin-top:6px"></div></div>`;
  h+=`<div class="card"><h2 style="margin-top:0">Tus notas (${fb.length})</h2>`;
  h+=fb.length?fb.map(f=>`<div style="border-left:2px solid var(--line);padding-left:10px;margin:6px 0"><div class="muted" style="font-size:11px">${esc((f.created_at||'').slice(0,10))} · ${esc(f.area||'General')}</div>${esc(f.texto)}</div>`).join(""):`<div class="muted">Sin notas aún.</div>`;
  h+=`</div>`;
  $("v-interno").innerHTML=h;
}
async function enviarFeedbackInterno(){
  const txt=$("fi_txt").value.trim();if(!txt){$("fiMsg").textContent="Escribe algo.";return;}
  $("fiMsg").textContent="Enviando…";
  const {error}=await sb.from("feedback_interno").insert({autor_id:MIID,area:$("fi_area").value,texto:txt});
  if(error){$("fiMsg").innerHTML=`<span class="alert">${esc(error.message)}</span>`;return;}
  $("fi_txt").value="";verInterno();
}
async function generarConsolaDigest(){
  const el=$("ciMsg");if(el)el.textContent="Analizando tus notas con IA…";
  const {data,error}=await sb.functions.invoke("feedback-digest",{body:{fuente:"consola"}});
  if(error){if(el)el.innerHTML=`<span class="alert">${esc(error.message)}</span>`;return;}
  if(data&&data.n===0){if(el)el.textContent="Sin notas nuevas para analizar todavía.";return;}
  verInterno();
}

init();
</script>
